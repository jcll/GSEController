# Default CI lane: repository hygiene, non-UI tests, and a release build.
# UI smoke coverage lives in the separate path-gated workflow so ordinary model
# or runtime changes do not pay the full XCUI cost.
name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_PROJECT: GSEController.xcodeproj
  XCODE_SCHEME: GSEController
  XCODE_DESTINATION: platform=macOS,arch=arm64

jobs:
  hygiene:
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Create LocalConfig.xcconfig
        run: |
          cat > LocalConfig.xcconfig << 'EOF'
          BUNDLE_ID_PREFIX = com.example
          PRODUCT_BUNDLE_IDENTIFIER = $(BUNDLE_ID_PREFIX).GSEController
          EOF

      - name: Check repository hygiene
        run: |
          git diff --check
          if git ls-files --error-unmatch LocalConfig.xcconfig >/dev/null 2>&1; then
            echo "::error::LocalConfig.xcconfig must not be committed"
            exit 1
          fi
          if git ls-files '*.DS_Store' | grep -q .; then
            echo "::error::.DS_Store files must not be committed"
            git ls-files '*.DS_Store'
            exit 1
          fi

  unit-tests:
    runs-on: macos-15
    timeout-minutes: 25
    needs: hygiene
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create LocalConfig.xcconfig
        run: |
          cat > LocalConfig.xcconfig << 'EOF'
          BUNDLE_ID_PREFIX = com.example
          PRODUCT_BUNDLE_IDENTIFIER = $(BUNDLE_ID_PREFIX).GSEController
          EOF

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/GSEControllerDerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('GSEController.xcodeproj/project.pbxproj', 'GSEController/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Run unit tests
        run: |
          ENABLE_REAL_HELPER_TESTS=1 xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination "$XCODE_DESTINATION" \
            -derivedDataPath "$RUNNER_TEMP/GSEControllerDerivedData" \
            -resultBundlePath "$RUNNER_TEMP/GSEController-UnitTests.xcresult" \
            test \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload unit test result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GSEController-UnitTests-xcresult
          path: ${{ runner.temp }}/GSEController-UnitTests.xcresult
          if-no-files-found: ignore

  release-build:
    runs-on: macos-15
    timeout-minutes: 20
    needs: hygiene
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create LocalConfig.xcconfig
        run: |
          cat > LocalConfig.xcconfig << 'EOF'
          BUNDLE_ID_PREFIX = com.example
          PRODUCT_BUNDLE_IDENTIFIER = $(BUNDLE_ID_PREFIX).GSEController
          EOF

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/GSEControllerDerivedData
          key: ${{ runner.os }}-deriveddata-release-${{ hashFiles('GSEController.xcodeproj/project.pbxproj', 'GSEController/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-release-

      - name: Build Release
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "$XCODE_DESTINATION" \
            -derivedDataPath "$RUNNER_TEMP/GSEControllerDerivedData" \
            -resultBundlePath "$RUNNER_TEMP/GSEController-ReleaseBuild.xcresult" \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload release build result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GSEController-ReleaseBuild-xcresult
          path: ${{ runner.temp }}/GSEController-ReleaseBuild.xcresult
          if-no-files-found: ignore

      - name: Upload release app bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GSEController-Release
          path: ${{ runner.temp }}/GSEControllerDerivedData/Build/Products/Release/GSEController.app
          if-no-files-found: warn
