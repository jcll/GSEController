name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # NOTE: macOS 26 runner not yet available on GitHub-hosted Actions.
    # This build runs against the macOS 15 SDK (Xcode 16) and will fail or
    # produce inaccurate results because the project requires MACOSX_DEPLOYMENT_TARGET=26.0.
    # Update to macos-26 (or equivalent) once it is available.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Create LocalConfig.xcconfig
        run: |
          cat > LocalConfig.xcconfig << 'EOF'
          BUNDLE_ID_PREFIX = com.example
          PRODUCT_BUNDLE_IDENTIFIER = $(BUNDLE_ID_PREFIX).GSEController
          EOF

      - name: Build (Debug)
        run: |
          xcodebuild \
            -project GSEController.xcodeproj \
            -scheme GSEController \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
